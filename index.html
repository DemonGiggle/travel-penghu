<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>澎湖旅行日記</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <header>
    <h1>澎湖旅行日記</h1>
    <p>探索台灣最美的海島風光</p>
  </header>

  <section id="gallery">
    <div class="slider">
      <img src="images/gallery/1.jpg" alt="澎湖風景1" class="slide active">
      <img src="images/gallery/2.jpg" alt="澎湖風景2" class="slide">
      <img src="images/gallery/3.jpg" alt="澎湖風景3" class="slide">
      <button class="prev" onclick="changeSlide(-1)">❮</button>
      <button class="next" onclick="changeSlide(1)">❯</button>
    </div>
  </section>

  <section id="content">
    <h2>旅行筆記</h2>
    <p>這趟澎湖之旅，讓我感受到大自然的寧靜與壯麗...</p>
  </section>

  <footer>
    <p>&copy; 2026 澎湖旅行日記</p>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
